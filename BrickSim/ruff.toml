include = ["*.py"]
extend-exclude = [
    "demos/demo_assembly.py",
    "demos/demo_inhand.py",
    "demos/demo_keyboard_teleop.py",
    "demos/demo_teleop.py",
    "experiments/evaluate_stability.py",
    "experiments/static_analysis.py",
]
src = ["python"]

[lint]
select = ["E", "F", "N", "I", "D", "DOC201", "TID251", "ANN001"]
preview = true

[lint.pydocstyle]
convention = "google"

[lint.flake8-tidy-imports.banned-api]
"typing.Any".msg = "Do not use Any. Use a concrete type, Protocol, object, or a local stub."
"typing.cast".msg = "Do not use cast as a blanket escape hatch. Prefer a concrete Protocol or stub."
